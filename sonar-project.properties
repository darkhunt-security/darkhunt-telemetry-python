# SonarCloud project configuration
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
#
# Analysis runs via SonarCloud Automatic Analysis (the SonarQube Cloud GitHub
# App scans pushes and PRs directly). There is no CI scanner step and no
# SONAR_TOKEN secret — Automatic Analysis reads this file for configuration.
# Project + organization keys are public (visible in the SonarCloud URL).
sonar.projectKey=darkhunt-security_darkhunt-telemetry-python
sonar.organization=darkhunt-ai
sonar.host.url=https://sonarcloud.io

sonar.sources=darkhunt_telemetry
sonar.tests=tests
sonar.python.version=3.9, 3.10, 3.11, 3.12, 3.13

# ---------------------------------------------------------------------------
# Issue suppressions. Each entry is a deliberate, justified exception — real
# defects and easy wins are fixed in code, not silenced here.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=maskingSecrets,apiParams,genOverride,constNamespace,cognitiveInherent1,cognitiveInherent2,cognitiveInherent3,identityTests,noLockfile,actionPin

# 1) Secret-scanner false positives on the bundled masking ruleset.
#    rules.json's `examples:` arrays are synthetic fixtures — zero-entropy
#    strings whose only purpose is to demonstrate what each detection regex
#    matches (GitHub PAT shapes, Stripe key shapes, etc.). The scanner cannot
#    tell "example of a secret format" from "real leaked secret", so it flags
#    every example. Suppress the whole `secrets` family for this one file.
sonar.issue.ignore.multicriteria.maskingSecrets.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.maskingSecrets.resourceKey=darkhunt_telemetry/masking/rules/rules.json

# 2) S107 "too many parameters" on the public tracing API. Trace/Span/
#    Generation/client expose many keyword options by design (mirroring the TS
#    SDK's options objects); explicit kwargs give callers discoverable,
#    typed arguments. Collapsing them to a single opaque options bag would hurt
#    ergonomics for the sake of a metric.
sonar.issue.ignore.multicriteria.apiParams.ruleKey=python:S107
sonar.issue.ignore.multicriteria.apiParams.resourceKey=darkhunt_telemetry/**/*.py

# 3) S2638 override-signature on Generation.update()/end(). Generation
#    intentionally accepts a superset of Span's keyword args (model/usage/cost);
#    all args are keyword-only with defaults, so call sites stay compatible.
sonar.issue.ignore.multicriteria.genOverride.ruleKey=python:S2638
sonar.issue.ignore.multicriteria.genOverride.resourceKey=darkhunt_telemetry/span.py

# 4) S101 class-name casing for the ATTR/GEN_AI constant namespaces — deliberate
#    SCREAMING_CASE sibling namespaces of wire-attribute keys.
sonar.issue.ignore.multicriteria.constNamespace.ruleKey=python:S101
sonar.issue.ignore.multicriteria.constNamespace.resourceKey=darkhunt_telemetry/attributes.py

# 5) S3776 cognitive complexity on three functions where the complexity is
#    inherent, not accidental: the client config resolver (straight-line
#    arg>env>default merging), the sanitizer's recursive type-dispatch walk,
#    and the Keccak-256 permutation (a fixed cryptographic round loop).
sonar.issue.ignore.multicriteria.cognitiveInherent1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.cognitiveInherent1.resourceKey=darkhunt_telemetry/client.py
sonar.issue.ignore.multicriteria.cognitiveInherent2.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.cognitiveInherent2.resourceKey=darkhunt_telemetry/masking/sanitizer.py
sonar.issue.ignore.multicriteria.cognitiveInherent3.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.cognitiveInherent3.resourceKey=darkhunt_telemetry/masking/validators/keccak.py

# 6) S5796 "is vs ==" in tests that INTENTIONALLY assert object identity
#    (child_args must return the same input object, not a copy).
sonar.issue.ignore.multicriteria.identityTests.ruleKey=python:S5796
sonar.issue.ignore.multicriteria.identityTests.resourceKey=tests/**/*.py

# 7) S8565 "no lock file". This is a library, not an application — libraries
#    declare version ranges and must NOT ship a pinned lock file (it would
#    conflict with consumers' resolvers).
sonar.issue.ignore.multicriteria.noLockfile.ruleKey=text:S8565
sonar.issue.ignore.multicriteria.noLockfile.resourceKey=pyproject.toml

# 8) S7637 action-SHA pinning in workflows. We pin first-party actions to major
#    version tags; adopting full-SHA pins is a repo-wide policy better handled
#    with Dependabot updates than hand-maintained hashes.
sonar.issue.ignore.multicriteria.actionPin.ruleKey=githubactions:S7637
sonar.issue.ignore.multicriteria.actionPin.resourceKey=.github/workflows/**
