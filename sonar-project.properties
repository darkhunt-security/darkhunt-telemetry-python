# SonarCloud project configuration
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
#
# Analysis runs via SonarCloud Automatic Analysis (the SonarQube Cloud GitHub
# App scans pushes and PRs directly). Automatic Analysis reads the basic
# configuration below (keys, sources, tests, language version, exclusions) but
# does NOT read `sonar.issue.ignore.*` from this file — rule-level issue
# exclusions must live in the project settings instead (see note at the bottom).
# Project + organization keys are public (visible in the SonarCloud URL).
sonar.projectKey=darkhunt-security_darkhunt-telemetry-python
sonar.organization=darkhunt-ai
sonar.host.url=https://sonarcloud.io

sonar.sources=darkhunt_telemetry
sonar.tests=tests
sonar.python.version=3.9, 3.10, 3.11, 3.12, 3.13

# Exclude the bundled masking ruleset from analysis entirely: it is generated
# DATA (regex patterns + synthetic example fixtures), not code — there is
# nothing meaningful to analyze, and its `examples:` strings otherwise trip the
# secret scanner.
sonar.exclusions=darkhunt_telemetry/masking/rules/rules.json

# ---------------------------------------------------------------------------
# Rule-level issue exclusions are configured at the PROJECT level, not here —
# Automatic Analysis ignores `sonar.issue.ignore.*` in this file. Manage them at
# Administration → Analysis Scope → Issue Exclusions (the
# `sonar.issue.ignore.multicriteria` project setting). Currently excluded, each a
# justified false-positive or inherent-design exception (real defects are fixed
# in code, not excluded):
#   • python:S107   darkhunt_telemetry/**/*.py   — option-rich public API by design
#   • python:S2638  span.py                       — Generation intentionally widens Span's kwargs
#   • python:S3776  client.py, sanitizer.py, keccak.py — inherent complexity (config/dispatch/crypto)
#   • python:S101   attributes.py                 — ATTR/GEN_AI constant namespaces
#   • python:S5796  tests/**/*.py                 — intentional object-identity assertions
#   • text:S8565    pyproject.toml                — a library must not ship a lock file
#   • githubactions:S7637  .github/workflows/**   — action SHA-pinning deferred to Dependabot
# ---------------------------------------------------------------------------
