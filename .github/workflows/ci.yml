# Runs lint/type/security checks and the test suite on every push / PR.
# Uses uv (astral-sh) for fast, reproducible installs from uv.lock. The build
# backend stays hatchling; `uv build` just drives it.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    # Static analysis: ruff (lint + format), mypy (type-check the package we ship
    # types for), and bandit (security). Runs once — no version matrix needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          # Pin the uv version so the action doesn't query the GitHub API for
          # "latest" on every run — that lookup is flaky and fails CI during
          # GitHub API outages.
          version: "0.11.29"
          enable-cache: true
      - name: Install (locked, all extras)
        run: uv sync --locked --all-extras --python 3.12
      - name: ruff (lint)
        run: uv run ruff check darkhunt_telemetry tests
      - name: ruff (format check)
        run: uv run ruff format --check darkhunt_telemetry tests
      - name: mypy (type-check)
        run: uv run mypy
      - name: bandit (security)
        run: uv run bandit -c pyproject.toml -r darkhunt_telemetry

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          # Pin the uv version so the action doesn't query the GitHub API for
          # "latest" on every run — that lookup is flaky and fails CI during
          # GitHub API outages.
          version: "0.11.29"
          enable-cache: true
      - name: Install (locked, all extras) on Python ${{ matrix.python-version }}
        run: uv sync --locked --all-extras --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest -q

  build:
    # Prove the package builds (sdist + wheel via hatchling) and passes metadata
    # checks. `uv build` invokes the PEP 517 backend declared in pyproject.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          # Pin the uv version so the action doesn't query the GitHub API for
          # "latest" on every run — that lookup is flaky and fails CI during
          # GitHub API outages.
          version: "0.11.29"
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*

  publish:
    # main = release: every push to main publishes a unique version straight to
    # PyPI. The version is MAJOR.MINOR (from darkhunt_telemetry/_version.py, which
    # you control) + this run's number as the patch — e.g. 0.5.42. PyPI versions
    # are immutable, so the run number guarantees each merge gets a fresh,
    # monotonically increasing version. Bump MAJOR.MINOR in _version.py to start
    # a new series; CI owns the patch segment.
    #
    # Publishing uses PyPI Trusted Publishing (OIDC) — NO API token is stored.
    # One-time setup: register a (pending) Trusted Publisher on PyPI for project
    # `darkhunt-telemetry` pointing at owner=darkhunt-security,
    # repo=darkhunt-telemetry-python, workflow=ci.yml, environment=pypi, and
    # create the `pypi` GitHub Environment.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    # Serialize publishes so two quick merges can't race on the build/upload.
    concurrency:
      group: publish-pypi
      cancel-in-progress: false
    environment:
      name: pypi
      url: https://pypi.org/p/darkhunt-telemetry
    permissions:
      contents: read # for checkout
      id-token: write # REQUIRED for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"
          enable-cache: true
      - name: Compute release version
        id: version
        # MAJOR.MINOR is human-controlled in _version.py; the patch is this run's
        # number, so every merge to main is a unique, increasing version.
        run: |
          FULL=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' darkhunt_telemetry/_version.py)
          MAJOR_MINOR=$(echo "$FULL" | cut -d. -f1,2)
          echo "version=${MAJOR_MINOR}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      - name: Stamp version into _version.py
        run: |
          sed -i "s/^__version__ = .*/__version__ = \"${{ steps.version.outputs.version }}\"/" darkhunt_telemetry/_version.py
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Record published version
        run: |
          echo "Published \`${{ steps.version.outputs.version }}\` to PyPI" >> "$GITHUB_STEP_SUMMARY"
