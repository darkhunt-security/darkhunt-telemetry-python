# Publishes to PyPI when a GitHub Release is published.
#
#   gh release create vX.Y.Z --generate-notes
#
# Publishing uses PyPI **Trusted Publishing (OIDC)** — there is NO API token
# stored in the repo. The `pypi` GitHub Environment + the id-token permission let
# PyPI verify this exact workflow via a short-lived OIDC JWT. Configure the
# trusted publisher once on PyPI (see README / the setup guide) before the first
# release.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify tag matches package version
        # Refuse to publish a tag that doesn't match darkhunt_telemetry.__version__
        # (strip a leading "v" from the tag: v0.5.5 -> 0.5.5).
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import darkhunt_telemetry._version as v; print(v.__version__)")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match package version ($PKG). Bump darkhunt_telemetry/_version.py and pyproject.toml."
            exit 1
          fi

      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    # The Environment gate is where you can require manual approval / restrict to
    # tags. Its name must match the trusted-publisher config on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/darkhunt-telemetry
    permissions:
      id-token: write # REQUIRED for OIDC Trusted Publishing. No password/token used.
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — the action mints an OIDC token and PyPI verifies it.
        # Provenance/attestations are generated by default on public runners.

  attach-wheel:
    # Attach the built artifacts to the GitHub Release for install-from-URL.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to upload release assets
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
